<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Front-end/src/styles/login/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Login - Dev stickers</title>
</head>
<body>
    <div class="container-login">
        <h1 class="tittle">LOGIN</h1>
        <div class="user-action">
            <div class="container-input">
                <span class="input-request">E-mail</span>
                <div class="sub-container-input">
                    <input type="text" placeholder="Digite seu e-mail">
                    <i class="fas fa-eye" id="eye1"></i>
                </div>
            </div>
            <div class="container-input">
                <span class="input-request">Senha</span>
                <div class="sub-container-input">
                    <input type="password" placeholder="Digite sua senha">
                    <i class="fas fa-eye" id="eye2"></i>
                </div>
            </div>
            <div class="container-remember">
                <label class="remember-label">
                    <input type="checkbox" class="remember">
                    <span class="remember-text">Lembrar de mim</span>
                </label>
            </div>
            <a href="" class="redrect"><span class="create-acc">Não possui conta? Clique aqui para criar.</span></a>
        </div>
        <button class="login">Login</button>
    </div>
</body>
<script src="/Front-end/src/js/login-page/login.js"></script>
</html>
